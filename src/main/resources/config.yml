# ============================================
# KaMenu Global Configuration File
# KaMenu 全局配置文件
# ============================================

# Configuration file version (DO NOT MODIFY THIS VALUE)
# 配置文件版本（请勿修改此值，插件更新时用于自动检测并更新配置）
config-version: 5

# Plugin language (must match filename in lang/ folder)
# Supported values: zh_CN (Chinese), en_US (English)
# 插件语言（对应 lang/ 文件夹下的文件名）
# 支持的值: zh_CN (中文), en_US (英文)
language: 'en_US'

# ============================================
# BungeeCord Configuration
# 蹦极网配置
# ============================================
# Enable BungeeCord support for server: actions
# Only enable this if your server is running behind a BungeeCord/Velocity proxy
# 启用蹦极支持用于 server: 动作
# 仅在您的服务器运行在 BungeeCord/Velocity 代理后面时启用此项
bungeecord: true

# ============================================
# Input Capture Configuration
# 输入捕获配置
# ============================================
input-capture:
  # Trim leading and trailing spaces from text input captures before actions and conditions read $(input_key)
  # 在动作和条件读取 $(input_key) 前，移除文本输入内容前后的空格
  # Disabled by default for backward compatibility; enable it if most of your inputs are command arguments, player names, IDs, or numbers.
  # 为保持旧菜单兼容性默认关闭；若你的输入大多用于指令参数、玩家名、ID 或数字，建议开启。
  trim-edge-spaces: true

  # Named remove character lists for Inputs.*.remove_chars.
  # Inputs can reference a preset by name, for example: remove_chars: global
  # 输入框 remove_chars 的命名字符移除列表。
  # 菜单内可直接引用预设名，例如：remove_chars: global
  remove-char-lists:
    global:
      - '&'
      - '_'
      - '\s'
      - '\n'

# ============================================
# Database Configuration
# 数据库配置
# ============================================
storage:
  # Database type: sqlite or mysql
  # 数据库类型: sqlite 或 mysql
  # SQLite: Local file-based database, no additional setup required
  # MySQL: Requires a running MySQL/MariaDB server
  type: 'sqlite'

  # MySQL Configuration (only used if type: mysql)
  # MySQL 配置（仅在 type: mysql 时使用）
  host: 'localhost'      # MySQL server hostname / MySQL服务器主机名
  port: 3306             # MySQL server port / MySQL服务器端口
  db: 'minecraft'        # Database name / 数据库名
  user: 'root'           # MySQL username / MySQL用户名
  password: ''           # MySQL password / MySQL密码

# ============================================
# Hotkey/Action Listener Configuration
# 快捷键/动作监听配置
# ============================================
listeners:
  # Swap hand listener (triggered by pressing F key by default)
  # 切换副手监听器（默认按 F 键触发）
  swap-hand:
    enabled: true           # Enable this listener / 启用此监听器
    menu: 'example/main_menu'       # Menu file path to open / 要打开的菜单文件路径
    require-sneaking: true  # Require sneaking to trigger / 需要潜行才能触发

  # Right-click player listener (triggered by right-clicking on a player)
  # 右键玩家监听器（右键玩家触发）
  player-click:
    enabled: true          # Enable this listener / 启用此监听器
    menu: 'example/inspect_player'  # Menu file path to open / 要打开的菜单文件路径
    require-sneaking: true # Require sneaking to trigger (Shift+Right-Click) / 需要潜行才能触发（Shift+右键）

  # Item lore detection listener (triggered by right-clicking the item)
  # 物品lore检测监听器（右键物品触发）
  item-lore:
    # Main menu configuration
    # 主菜单配置
    main-menu:
      enabled: true           # Enable this menu / 启用此菜单
      material: 'CLOCK'       # Item material to detect / 要检测的物品材质
      target-lore: 'main menu'     # Lore text to match / 匹配的lore文本
      menu: 'example/main_menu'       # Menu file path to open / 要打开的菜单文件路径
      require-sneaking: false # Require sneaking to trigger / 需要潜行才能触发

    # Shop menu configuration
    # 商店菜单配置
    shop-menu:
      enabled: true           # Enable this menu / 启用此菜单
      material: 'BUNDLE'      # Item material to detect / 要检测的物品材质
      target-lore: 'open shop'     # Lore text to match / 匹配的lore文本
      menu: 'shop_menu'       # Menu file path to open / 要打开的菜单文件路径
      require-sneaking: false # Require sneaking to trigger / 需要潜行才能触发

    # Warp menu configuration
    # 传送菜单配置
    warp-menu:
      enabled: false          # Enable this menu / 启用此菜单
      material: 'COMPASS'     # Item material to detect / 要检测的物品材质
      target-lore: 'teleport'    # Lore text to match / 匹配的lore文本
      menu: 'warp_menu'      # Menu file path to open / 要打开的菜单文件路径
      require-sneaking: false # Require sneaking to trigger / 需要潜行才能触发

# ============================================
# Custom Commands Registration
# 自定义指令注册
# ============================================
# Format 1: command-name: menu-file-path
# 格式 1: 指令名: 菜单文件路径
# Format 2: command-name: { actions: [...] }
# 格式 2: 指令名下配置 actions 动作队列
custom-commands:
  zcd: 'example/main_menu'       # /zcd command / zcd指令
  actions: 'example/actions_demo'  # /actions command / actions指令
  menu: 'example/main_menu'      # /menu command / menu指令
  test:
    actions:
      - "tell: 嘿，你输入了/test指令"
      - "sound: entity.experience_orb.pickup;volume=1.0;pitch=1.3"
      - "tell: 你想测试什么内容呢？"

# ============================================
# Update Checker
# 更新检查
# ============================================
# Check for new versions on GitHub when OP players join
# OP 玩家进入时检查 GitHub 上是否有新版本
check-update: true
