# KaMenu 全局配置文件

# 插件语言 (对应 lang/ 文件夹下的文件名)
language: 'zh_CN'

# 数据库配置
storage:
  # 可选: sqlite, mysql
  type: 'sqlite'
  host: 'localhost'
  port: 3306
  db: 'minecraft'
  user: 'root'
  password: ''

# 快捷键/动作监听配置
listeners:
  # 切换副手 (默认按键 F) 触发
  swap-hand:
    enabled: true
    # 触发时打开的菜单文件名
    menu: 'main_menu'
    # 是否需要潜行时才触发
    require-sneaking: true

# 自定义指令注册
# 格式: 指令名: 菜单文件名
custom-commands:
  zcd: 'main_menu'
  shop: 'server_shop'
  menu: 'main_menu'