Title: '&8» &d&l扩展功能演示 &8«'

Body:
  intro:
    type: 'message'
    text: '&7此菜单展示了所有扩展的 Action 功能，包括 PAPI、标题、可点击文本等。'

  display_item:
    type: 'item'
    material: 'ENCHANTED_BOOK'
    name: '&c&l功能列表'
    description: '&f点击下方按钮测试不同的功能'

Inputs:
  test_input:
    type: 'input'
    text: '&a测试输入'
    default: '默认文本'
    max_length: 50

Bottom:
  type: 'multi'
  columns: 3

  buttons:
    test_tell:
      text: '&a[ tell ]'
      action:
        - 'tell: &a这是普通消息'
        - 'tell: &7支持颜色代码 &颜色&f'

    test_actionbar:
      text: '&b[ actionbar ]'
      action:
        - 'actionbar: &b这是 ActionBar 消息！'

    test_title:
      text: '&c[ title ]'
      action:
        - 'title: title=&c&l标题;subtitle=&e副标题;in=10;keep=60;out=20'

    test_hovertext:
      text: '&d[ hovertext ]'
      action:
        - 'hovertext: &7普通文本 <text=&a&l点击我;hover=&c执行指令 /help;command=/help> 更多文本'

    test_command:
      text: '&e[ command ]'
      action:
        - 'command: say 我执行了玩家指令'

    test_console:
      text: '&6[ console ]'
      action:
        - 'console: say 这是控制台执行的消息'

    test_sound:
      text: '&f[ sound ]'
      action:
        - 'sound: entity.player.levelup;volume=1.5;pitch=1.2'

    test_sound_category:
      text: '&8[ sound+ ]'
      action:
        - 'tell: &f播放不同类别的声音'
        - 'sound: ambient.cave;category=ambient'
        - 'sound: entity.experience_orb.pickup;volume=2.0;category=player'

    test_open:
      text: '&5[ open ]'
      action:
        - 'open: demo'

    test_papi:
      text: '&3[ PAPI ]'
      action:
        - 'tell: &a玩家: %player_name%'
        - 'tell: &b世界: %world%'
        - 'tell: &c坐标: %x%, %y%, %z%'
        - 'tell: &d血量: %health%/%max_health%'

    test_variable:
      text: '&7[ 变量 ]'
      action:
        - 'tell: &f你输入的内容: &e$(test_input)'

    test_combine:
      text: '&9[ 组合 ]'
      action:
        - 'title: title=&6组合测试;subtitle=&f变量: $(test_input);in=5;keep=40;out=10'
        - 'actionbar: &aActionBar + PAPI: %player_name%'
        - 'sound: block.note_block.pling'

    test_close:
      text: '&4[ 关闭 ]'
      action:
        - 'tell: &c再见！'
        - 'close'

  exit:
    text: '&8[ 退出 ]'
    action:
      - 'actionbar: &7菜单已关闭'
      - 'close'
