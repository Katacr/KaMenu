Title: '&8» &c&l管理员工具 &8«'

Body:
  intro:
    type: 'message'
    text: '&7管理员专用菜单，位于 admin 文件夹下。'

  warning_item:
    type: 'item'
    material: 'BARRIER'
    name: '&c&l警告'
    description: '&f此菜单需要管理员权限'

Inputs:
  target_player:
    type: 'input'
    text: '&a目标玩家'
    default: 'Player'
    max_length: 16

Bottom:
  type: 'multi'
  columns: 2
  buttons:
    kick:
      text: '&c[ 踢出 ]'
      actions:
        - 'command: kick $(target_player)'
        - 'tell: &c已踢出玩家: $(target_player)'

    ban:
      text: '&4[ 封禁 ]'
      actions:
        - 'console: ban $(target_player)'

  exit:
    text: '&8[ 关闭 ]'
    actions:
      - 'close'
