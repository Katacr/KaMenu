Title: '&8» &6&l条件判断系统 &8«'

Body:
  welcome_msg:
    type: 'message'
    text: '&7欢迎使用基于 Paper 1.21.8 原生 Dialog API 构建的高级菜单。'

  info_card:
    type:  # 根据条件显示不同的类型
      - condition: "%player_is_op% == true"
        allow: 'item'
        deny: 'message'
    text: '&7你不是op，将显示一个没有钻石的文本。'
    material: 'DIAMOND'
    description: '&f你是op，将显示一个有钻石的文本。'

Inputs:
  volume_setting:
    type: 'slider'
    text: '%button_name%' #举例 papi变量
    min: '{data:var}'  # {data:var}/{gdata:var}内置值，从数据库中获取
    max: 100 # 同理
    step: 1 # 同理
    default: 50 # 同理
    # 必须包含两个 %s，否则看不到数字
    format: '%s: %s%%' # 同理

  # 2. 开启多行模式的文本框
  user_feedback:
    type: 'input'
    text: '&a您的意见'
    default: '请在此输入内容...'
    multiline:
      max_lines: 5
      height: 80


  # 3. 带有隐藏标签的下拉框
  color_select:
    type: 'dropdown'
    text: '颜色选择' # 如果 label_visible 为 false，这个文本会被隐藏
    label_visible: false
    options:
      - '&c红色'
      - '&a绿色'
      - '&b蓝色'
    default_id: '&a绿色'

Bottom:
  type: 'confirmation'
  confirm:
    text: '&a[ 确认提交 ]'
    actions:
      - 'tell: &8&l--------------------------------'
      - 'tell: &6感谢提交！您的偏好：'
      - 'tell: &f音量: &e$(volume_setting)%'
      - 'tell: &f反馈: &f$(user_feedback)'
      - 'tell: &f颜色: &f$(color_select)'
      # 显示玩家信息 (支持 PAPI)
      - 'tell: &f玩家: &a%player_name% &f所在世界: &e%world%'
      - 'actionbar: &a提交成功！3秒后关闭...'
      # 播放声音 - 支持音量和音调
      - 'sound: entity.experience_orb.pickup;volume=1.0;pitch=1.5'
  deny:
    text: '&c[ 以后再说 ]'
    actions:
      - 'actionbar: &c您已取消操作'
      - 'sound: block.chest.close;volume=0.8;pitch=0.8'