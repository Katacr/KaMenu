Title: '&8» &d&l扩展功能演示 &8«'

Body:
  intro:
    type: 'message'
    text: '&7此菜单展示了所有扩展的 Action 功能，包括 PAPI、标题、可点击文本等。'

  display_item:
    type: 'item'
    material: 'ENCHANTED_BOOK'
    name: '&c&l功能列表'
    description: '&f点击下方按钮测试不同的功能'

Inputs:
  test_input:
    type: 'input'
    text: '&a测试输入'
    default: '默认文本'
    max_length: 50

Bottom:
  type: 'multi'
  columns: 3

  buttons:
    katacr_tell:
      show-condition: '%player_name% == Katacr'
      text: '&a[ Katacr tell ]'
      actions:
        - condition: '%player_name% == Katacr'
          allow:
            - 'tell: &a这是Katacr专属消息'
          deny:
            - 'tell: &7你是%player_name%，只有Katacr看得到消息'


    test_tell:
      text: '&a[ tell ]'
      actions:
        - 'tell: &a这是普通消息'
        - 'tell: &7支持颜色代码 &颜色&f'

    test_actionbar:
      text: '&b[ actionbar ]'
      actions:
        - 'actionbar: &b这是 ActionBar 消息！'

    test_title:
      text: '&c[ title ]'
      actions:
        - 'title: title=&c&l标题;subtitle=&e副标题;in=10;keep=60;out=20'

    test_hovertext:
      text: '&d[ hovertext ]'
      actions:
        - 'hovertext: &7普通文本 <text=&a&l点击我;hover=&c执行指令 /help;command=/help> 更多文本'

    test_command:
      text: '&e[ command ]'
      actions:
        - 'command: say 我执行了玩家指令'

    test_console:
      text: '&6[ console ]'
      actions:
        - 'console: say 这是控制台执行的消息'

    test_sound:
      text: '&f[ sound ]'
      actions:
        - 'sound: entity.player.levelup;volume=1.5;pitch=1.2'

    test_sound_category:
      text: '&8[ sound+ ]'
      actions:
        - 'tell: &f播放不同类别的声音'
        - 'sound: ambient.cave;category=ambient'
        - 'sound: entity.experience_orb.pickup;volume=2.0;category=player'

    test_open:
      text: '&5[ open ]'
      actions:
        - 'open: demo'

    test_papi:
      text: '&3[ PAPI ]'
      actions:
        - 'tell: &a玩家: %player_name%'
        - 'tell: &b世界: %player_world%'
        - 'tell: &c坐标: %player_x%, %player_y%, %player_z%'
        - 'tell: &d血量: %player_health%/%player_max_health%'

    test_variable:
      text: '&7[ 变量 ]'
      actions:
        - 'tell: &f你输入的内容: &e$(test_input)'

    test_combine:
      text: '&9[ 组合 ]'
      actions:
        - 'title: title=&6组合测试;subtitle=&f变量: $(test_input);in=5;keep=40;out=10'
        - 'actionbar: &aActionBar + PAPI: %player_name%'
        - 'sound: block.note_block.pling'

    test_close:
      text: '&4[ 关闭 ]'
      actions:
        - 'tell: &c再见！'
        - 'close'

    test_toast:
      text: '&6[ 吐司 ]'
      actions:
        - 'toast: type=challenge;msg=&f恭喜你完成了挑战！;icon=diamond'
        - 'close'

    test_wait:
      text: '&a[ wait ]'
      actions:
        - 'close'
        - 'tell: &e开始执行...'
        - 'wait: 20'
        - 'tell: &a1秒后...'
        - 'wait: 20'
        - 'tell: &b2秒后...'
        - 'wait: 20'
        - 'tell: &c3秒完成！'

    test_data:
      text: '&a[ set data ]'
      actions:
        - 'close'
        - 'tell: &e正在设置test个人数据为“Hello”...'
        - 'set-data: test Hello'
        - 'wait: 1'
        - 'tell: &a设置成功！test值为: 内置:{data:test}/PAPI:%kamenu_data_test%'

    test_gdata:
      text: '&a[ set gdata ]'
      actions:
        - 'close'
        - 'tell: &e正在设置test全局数据“Global”...'
        - 'set-gdata: test Global'
        - 'wait: 1'
        - 'tell: &a设置成功！test值为: 内置:{gdata:test}/PAPI:%kamenu_gdata_test%'

  exit:
    text: '&8[ 退出 ]'
    actions:
      - 'actionbar: &7菜单已关闭'
      - 'close'
