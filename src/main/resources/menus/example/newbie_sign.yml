Title: '&8» &6&l新人七日签到 &8«'

Settings:
  can_escape: true
  after_action: NONE
  need_placeholder:
    - 'server'

Events:
  Open:
    # 首次进入：初始化数据
    - condition: '{data:sign_day} == null'
      allow:
        - 'data: type=set;key=sign_day;var=`0`'
  Click:
    # ========== 公共：今日已签到提示 ==========
    already_today:
      - 'sound: block.note_block.bass'
      - 'actionbar: &c今日已签到！请明天再来。'
    # ========== 公共：未到该天提示 ==========
    not_yet:
      - 'sound: block.note_block.bass'
      - 'actionbar: &c请按顺序完成前面的签到！'
    # ========== 公共：已领取提示 ==========
    already_done:
      - 'sound: block.note_block.bass'
      - 'actionbar: &a该天奖励已领取！'

Body:
  intro:
    type: 'message'
    text:
      - '&7每天完成一次签到，连续签到 &67&7 天可领取全部奖励'
      - '&7今日日期：&e%server_time_YYYYMMdd%'
    width: 320
  progress:
    type: 'message'
    text: '&f已签到：&a{data:sign_day}&f / &67 &f天'
    width: 200
  reward_legend:
    type: 'message'
    text:
      - '&6&l奖励图例： &e金币 &7| &b钻石 &7| &7铁锭 &7| &6金锭 &7| &a绿宝石'
    width: 350
  tip:
    type: 'message'
    text:
      - condition: '{data:sign_day} == 7'
        allow: '&6&l恭喜完成七日签到！'
        deny:
          - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
            allow: '&c今日已签到，明天再来吧～'
            deny: '&a今日可签到，点击下方对应按钮！'
    width: 300

Bottom:
  type: 'multi'
  columns: 1
  buttons:
    # ==================== 第 1 日 ====================
    day1:
      text:
        - condition: '{data:sign_day} >= 1'
          allow: '&a✔ 第一日'
          deny: '&e▶ 第一日'
      tooltip:
        - condition: '{data:sign_day} >= 1'
          allow:
            - '&a&l✓ 第一日签到 &7- &a已领取'
            - ''
            - '&7获得奖励：'
            - '  &e● 100 金币'
            - '  &b● 1 颗钻石'
          deny:
            - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
              allow:
                - '&c&l今日已签到'
                - ''
                - '&7已领取奖励：'
                - '  &e● 100 金币'
                - '  &b● 1 颗钻石'
                - ''
                - '&7明天再来签到 →'
              deny:
                - '&a&l▶ 第一日签到 &e&l(今日可签)'
                - ''
                - '&7点击领取以下奖励：'
                - '  &e● 100 金币'
                - '  &b● 1 颗钻石'
                - ''
                - '&e&o点击按钮进行签到'
      width: 150
      actions:
        # 已领取
        - condition: '{data:sign_day} >= 1'
          allow:
            - 'actions: already_done'
            - 'return'
        # 今日已签到
        - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
          allow:
            - 'actions: already_today'
            - 'return'
        # 正常签到
        - 'data: type=set;key=sign_last_date;var=`%server_time_YYYYMMdd%`'
        - 'data: type=set;key=sign_day;var=`1`'
        - 'money: type=add;num=100'
        - 'item: type=give;mats=DIAMOND;amount=1'
        - 'sound: entity.player.levelup'
        - 'toast: type=task;msg=&f第一日签到完成！;icon=diamond'
        - 'title: title=&a第一日签到;subtitle=&f获得 100金币 + 1钻石;in=5;keep=60;out=20'
        - 'tell: &a✔ 第一日签到成功！获得 &e100金币 &a+ &b1颗钻石'

