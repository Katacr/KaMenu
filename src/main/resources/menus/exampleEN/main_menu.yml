Title: '&fServer Main Menu'

Settings:
  can_escape: true
  after_action: 'CLOSE'

Events:
  Open:
    - 'tell: &aThank you for choosing our server!'

Body:
  item:
    type: 'item'
    material: 'DIAMOND'
    name: 'Server Icon'
  info:
    type: 'message'
    text: '&aPlease select the feature you want to use from the list below.'
  info2:
    type: 'message'
    text: '&a'

Bottom:
  type: 'multi'
  columns: 1
  buttons:
    world:
      text: '&9[ World Teleport ]'
      actions:
        - 'open: world_menu'
    land:
      text: '&c[ Land Management ]'
      actions:
        - 'open: land_menu'
    bag:
      text: '&a[ Portable Backpack ]'
      actions:
        - 'open: bag_menu'
    friend:
      text: '&b[ My Friends ]'
      actions:
        - 'open: friend_menu'
    sign:
      text: '&d[ Daily Check-in ]'
      actions:
        - 'open: sign_menu'
    game_event:
      text: '&5[ Event Center ]'
      actions:
        - 'open: event_menu'
    market:
      text: '&6[ Player Market ]'
      actions:
        - 'open: market_menu'

  exit:
    text: '&4[ Exit ]'
    actions:
      - 'tell: &cGoodbye!'
      - 'close'
