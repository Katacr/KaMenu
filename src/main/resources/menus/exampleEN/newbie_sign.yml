                    - '  &b● 1 Diamond'
                    - ''
                    - '&e&oClick button to sign in'
      width: 150
      actions:
        - condition: '{data:sign_day} >= 2'
          allow:
            - 'actions: already_done'
            - 'return'
        - condition: '{data:sign_day} < 1'
          allow:
            - 'actions: not_yet'
            - 'return'
        - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
          allow:
