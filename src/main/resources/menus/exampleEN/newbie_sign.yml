Title: '&8» &6&lNewbie 7-Day Sign-In &8«'

Settings:
  can_escape: true
  after_action: NONE
  need_placeholder:
    - 'server'

Events:
  Open:
    # First entry: initialize data
    - condition: '{data:sign_day} == null'
      allow:
        - 'data: type=set;key=sign_day;var=`0`'
  Click:
    # ========== Common: Already signed in today ==========
    already_today:
      - 'sound: block.note_block.bass'
      - 'actionbar: &cYou already signed in today! Come back tomorrow.'
    # ========== Common: Not yet reached ==========
    not_yet:
      - 'sound: block.note_block.bass'
      - 'actionbar: &cPlease complete previous sign-ins in order!'
    # ========== Common: Already claimed ==========
    already_done:
      - 'sound: block.note_block.bass'
      - 'actionbar: &aReward already claimed!'

Body:
  intro:
    type: 'message'
    text:
      - '&7Sign in once daily to get all rewards'
      - '&7after &67&7 consecutive days'
      - '&7Today: &e%server_time_YYYYMMdd%'
    width: 320
  progress:
    type: 'message'
    text: '&fSigned in: &a{data:sign_day}&f / &67 &fdays'
    width: 200
  reward_legend:
    type: 'message'
    text:
      - '&6&lReward Legend: &eCoins &7| &bDiamonds &7| &7Iron &7| &6Gold &7| &aEmeralds'
    width: 350
  tip:
    type: 'message'
    text:
      - condition: '{data:sign_day} == 7'
        allow: '&6&lCongratulations on completing 7-day sign-in!'
        deny:
          - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
            allow: '&cSigned in today, come back tomorrow~'
            deny: '&aSign in available today, click the button below!'
    width: 300

Bottom:
  type: 'multi'
  columns: 1
  buttons:
    # ==================== Day 1 ====================
    day1:
      text:
        - condition: '{data:sign_day} >= 1'
          allow: '&a✔ Day 1'
          deny: '&e▶ Day 1'
      tooltip:
        - condition: '{data:sign_day} >= 1'
          allow:
            - '&a&l✓ Day 1 Signed &7- &aClaimed'
            - ''
            - '&7Rewards received:'
            - '  &e● 100 Coins'
            - '  &b● 1 Diamond'
          deny:
            - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
              allow:
                - '&c&lSigned in today'
                - ''
                - '&7Rewards received:'
                - '  &e● 100 Coins'
                - '  &b● 1 Diamond'
                - ''
                - '&7Come back tomorrow →'
              deny:
                - '&a&l▶ Day 1 Sign &e&l(Today Available)'
                - ''
                - '&7Click to claim rewards:'
                - '  &e● 100 Coins'
                - '  &b● 1 Diamond'
                - ''
                - '&e&oClick button to sign in'
      width: 150
      actions:
        # Already claimed
        - condition: '{data:sign_day} >= 1'
          allow:
            - 'actions: already_done'
            - 'return'
        # Already signed in today
        - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
          allow:
            - 'actions: already_today'
            - 'return'
        # Normal sign in
        - 'data: type=set;key=sign_last_date;var=`%server_time_YYYYMMdd%`'
        - 'data: type=set;key=sign_day;var=`1`'
        - 'money: type=add;num=100'
        - 'item: type=give;mats=DIAMOND;amount=1'
        - 'sound: entity.player.levelup'
        - 'toast: type=task;msg=&fDay 1 sign-in complete!;icon=diamond'
        - 'title: title=&aDay 1 Sign-In;subtitle=&fReceived 100 Coins + 1 Diamond;in=5;keep=60;out=20'
        - 'tell: &a✔ Day 1 sign-in success! Received &e100 Coins &a+ &b1 Diamond'

    # ==================== Day 2 ====================
    day2:
      text:
        - condition: '{data:sign_day} >= 2'
          allow: '&a✔ Day 2'
          deny:
            - condition: '{data:sign_day} >= 1'
              allow: '&e▶ Day 2'
              deny: '&8✘ Day 2'
      tooltip:
        - condition: '{data:sign_day} >= 2'
          allow:
            - '&a&l✓ Day 2 Signed &7- &aClaimed'
            - ''
            - '&7Rewards received:'
            - '  &e● 150 Coins'
            - '  &b● 1 Diamond'
          deny:
            - condition: '{data:sign_day} < 1'
              allow:
                - '&8&l✘ Day 2 Sign &7- &8Locked'
                - ''
                - '&7Must complete &eDay 1 &7sign-in first'
                - '&7Button will light up after completion →'
              deny:
                - condition: "{data:sign_last_date} == %server_time_YYYYMMdd%"
                  allow:
