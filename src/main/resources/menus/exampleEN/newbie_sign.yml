            - 'return'
        - 'data: type=set;key=sign_last_date;var=`%server_time_YYYYMMdd%`'
        - 'data: type=set;key=sign_day;var=`2`'
        - 'money: type=add;num=150'
        - 'item: type=give;mats=DIAMOND;amount=1'
        - 'sound: entity.player.levelup'
        - 'toast: type=task;msg=&fDay 2 sign-in complete!;icon=diamond'
        - 'title: title=&aDay 2 Sign-In;subtitle=&fReceived 150 Coins + 1 Diamond;in=5;keep=60;out=20'
        - 'tell: &a✔ Day 2 sign-in success! Received &e150 Coins &a+ &b1 Diamond'

