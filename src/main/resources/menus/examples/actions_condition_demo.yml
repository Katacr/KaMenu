Title: 动作条件判断演示

Settings:
  can_escape: true
  pause: false

Body:
  message1:
    type: message
    text: "&a&l演示：动作支持条件判断！"

Inputs:
  setting:
    type: 'checkbox'
    text: '启用高级功能'
    default: false

Bottom:
  type: multi
  columns: 2

  buttons:
    1:
      text: '&a[ 管理员按钮 ]'
      # 使用 actions（复数）键，支持条件判断
      actions:
        - condition: "%player_is_op% == true"
          meet:
            - 'tell: &a✓ 您是管理员'
            - 'open: examples/manage_menu'
            - 'sound: entity.player.levelup;volume=1.0;pitch=1.0'
          deny:
            - 'tell: &c✗ 该功能仅限管理员可用'
            - 'sound: block.note_block.bass;volume=1.0;pitch=0.5'

    2:
      text: '&b[ VIP 按钮 ]'
      actions:
        - condition: "%player_level% >= 10"
          meet:
            - 'tell: &b✓ 您是 VIP 玩家'
            - 'title: title=欢迎 VIP;subtitle=尊贵的会员;in=10;keep=60;out=20'
            - 'console: give %player_name% diamond 1'
          deny:
            - 'tell: &c✗ 该功能仅限 VIP 玩家可用（等级需达到 10）'
            - 'actionbar: &e达到 10 级即可解锁'

    3:
      text: '&e[ 组合条件 ]'
      actions:
        - condition: "%player_is_op% == true || %player_level% >= 20"
          meet:
            - 'tell: &e✓ 满足条件（管理员或高等级）'
            - 'open: examples/conditional_value_demo'
          deny:
            - 'tell: &c✗ 不满足条件'
            - 'sound: block.fire.extinguish;volume=0.5;pitch=1.0'

    4:
      text: '&6[ 多个动作 ]'
      actions:
        - condition: "$(setting) == true"
          meet:
            - 'tell: &6✓ 高级功能已启用'
            - 'tell: &7您勾选了复选框'
            - 'sound: entity.experience_orb.pickup;volume=1.0;pitch=1.5'
            - 'actionbar: &a处理完成'
          deny:
            - 'tell: &7✓ 基础功能已执行'
            - 'tell: &c高级功能未启用'

  exit:
    text: '&c[ 退出 ]'
    actions:
      - 'tell: &7再见！'
      - 'close'
