name: KaMenu
version: '1.6.6'
main: org.katacr.kamenu.KaMenu
api-version: '1.21'
folia-supported: true
softdepend:
  - PlaceholderAPI
  - Vault
  - ItemsAdder
  - Oraxen
  - CraftEngine
commands:
  kamenu:
    description: KaMenu 主指令
    usage: /kamenu open <menuId>
    permission: kamenu.admin
    aliases: [km, menu]
permissions:
  kamenu.admin:
    description: 允许玩家使用菜单全部功能
    default: op
